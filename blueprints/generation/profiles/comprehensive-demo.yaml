# AssureTwin Comprehensive Demo Configuration
# Purpose: Generate full-featured synthetic data for AssureTwin platform demos
# Use case: Fraud detection, process mining, audit analytics, ML training
#
# Features enabled:
# - 500 vendors, 1000 customers, 200 employees, 2000 materials
# - All 5 process families: P2P, O2C, R2R, H2R, ATR
# - GAAP-compliant chart of accounts with subsidiary ledgers
# - OCEL 2.0 event logs with object lifecycle tracking
# - 2% fraud injection rate with specific patterns
# - Seasonal patterns and trend drift
# - Internal controls with COSO 2013 framework
# - SOX 302/404 compliance data

global:
  industry: manufacturing
  start_date: "2024-01-01"
  period_months: 12
  seed: 20240101
  group_currency: USD
  parallel: true
  worker_threads: 8
  memory_limit_mb: 8192

companies:
  - code: "1000"
    name: "AssureTwin Corp HQ"
    currency: USD
    country: US
    annual_transaction_volume: hundred_k
    volume_weight: 0.5
    fiscal_year_variant: K4
  - code: "2000"
    name: "AssureTwin Corp EU"
    currency: EUR
    country: DE
    annual_transaction_volume: hundred_k
    volume_weight: 0.3
    fiscal_year_variant: K4
  - code: "3000"
    name: "AssureTwin Corp APAC"
    currency: CNY
    country: CN
    annual_transaction_volume: hundred_k
    volume_weight: 0.2
    fiscal_year_variant: K4

chart_of_accounts:
  complexity: large
  industry_specific: true
  min_hierarchy_depth: 3
  max_hierarchy_depth: 6

# Master data counts (~500 vendors, ~1000 customers, ~200 employees, ~2000 materials)
master_data:
  vendors:
    count: 500
    intercompany_percent: 0.20
  customers:
    count: 1000
    intercompany_percent: 0.15
  materials:
    count: 2000
    bom_enabled: true
    average_bom_depth: 3
  fixed_assets:
    count: 200
  employees:
    count: 200

document_flows:
  p2p:
    enabled: true
    chains_per_month: 2500
    three_way_match_rate: 0.90
    partial_delivery_rate: 0.15
    gr_ir_clearing_enabled: true
  o2c:
    enabled: true
    chains_per_month: 3500
    credit_check_failure_rate: 0.05
    partial_shipment_rate: 0.12
    return_rate: 0.03

# OCPM (Object-Centric Process Mining) - OCEL 2.0 event logs
ocpm:
  enabled: true
  generate_lifecycle_events: true
  include_object_relationships: true
  compute_variants: true

# Fraud configuration - 2% rate with specific patterns
fraud:
  enabled: true
  fraud_rate: 0.02
  fraud_type_distribution:
    duplicate_payment: 0.15         # duplicate_invoices pattern
    fictitious_transaction: 0.15    # phantom_vendors pattern
    suspense_account_abuse: 0.15    # shell_companies + round_tripping
    revenue_manipulation: 0.15      # channel_stuffing pattern
    timing_anomaly: 0.10            # cookie_jar_reserves pattern
    split_transaction: 0.10         # threshold manipulation
    expense_capitalization: 0.10    # bill_and_hold pattern
    unauthorized_access: 0.10       # side_agreements pattern
  clustering_enabled: true
  clustering_factor: 0.3
  approval_thresholds:
    - 1000.0
    - 5000.0
    - 25000.0
    - 100000.0

# Enhanced anomaly injection with multi-stage schemes
anomaly_injection:
  enabled: true
  rates:
    total_rate: 0.02
    fraud_rate: 0.01
    error_rate: 0.005
    process_rate: 0.005
  multi_stage_schemes:
    enabled: true
  correlated_injection:
    enabled: true
  near_miss:
    enabled: true
    proportion: 0.30
  difficulty_classification:
    enabled: true
  context_aware:
    enabled: true
  labeling:
    generate_difficulty_labels: true
    generate_scheme_labels: true

# Internal controls with COSO 2013 framework
internal_controls:
  enabled: true
  coso_enabled: true
  include_entity_level_controls: true
  target_maturity_level: managed
  exception_rate: 0.02
  sod_violation_rate: 0.01
  export_control_master_data: true
  sox_materiality_threshold: 10000.0

# Business process weights for all 5 process families
business_processes:
  o2c_weight: 0.30          # Order to Cash
  p2p_weight: 0.35          # Procure to Pay
  r2r_weight: 0.15          # Record to Report
  h2r_weight: 0.10          # Hire to Retire
  a2r_weight: 0.10          # Acquire to Retire (ATR)

# Temporal drift and seasonal patterns
temporal:
  enabled: true
  amount_mean_drift: 0.02
  amount_variance_drift: 0.01
  anomaly_rate_drift: 0.001
  concept_drift_rate: 0.05
  sudden_drift_probability: 0.05

# US GAAP accounting standards compliance
accounting_standards:
  enabled: true
  framework: us_gaap
  revenue_recognition:
    enabled: true
  leases:
    enabled: true
  fair_value:
    enabled: true
  impairment:
    enabled: true

# Audit standards - ISA and SOX compliance
audit_standards:
  enabled: true
  isa_compliance:
    enabled: true
    framework: dual    # Use dual (ISA + PCAOB) framework
  generate_audit_trail: true
  sox:
    enabled: true
  pcaob:
    enabled: true

# Vendor network with supply chain tiers
vendor_network:
  enabled: true
  depth: 3

# Customer segmentation with value tiers
customer_segmentation:
  enabled: true

# Relationship strength calculation
relationship_strength:
  enabled: true

# Cross-process links for entity graph
cross_process_links:
  enabled: true
  inventory_p2p_o2c: true
  payment_bank_reconciliation: true
  intercompany_bilateral: true

# Balance and period close
balance:
  generate_opening_balances: true
  generate_trial_balances: true
  reconcile_subledgers: true

# Graph export for ML training
graph_export:
  enabled: true
  train_ratio: 0.70
  validation_ratio: 0.15
  hypergraph:
    enabled: true
    max_nodes: 100000
    aggregation_strategy: pool_by_counterparty
    output_format: unified
    governance_layer:
      include_coso: true
      include_controls: true
      include_sox: true
      include_vendors: true
      include_customers: true
      include_employees: true
    process_layer:
      include_p2p: true
      include_o2c: true
      events_as_hyperedges: true
    accounting_layer:
      include_accounts: true
      je_as_hyperedges: true
    cross_layer:
      enabled: true

# Intercompany transactions
intercompany:
  enabled: true
  ic_transaction_rate: 0.15
  generate_matched_pairs: true
  generate_eliminations: true

# Scenario metadata
scenario:
  tags:
    - assuretwin
    - comprehensive
    - fraud_detection
    - process_mining
    - audit
    - ocel_2_0
    - ml_training
  profile: clean
  description: "AssureTwin comprehensive demo with all features enabled - fraud detection, process mining, audit analytics"
  ml_training: true
  target_anomaly_ratio: 0.02

# Output configuration
output:
  output_directory: ./output/assuretwin_comprehensive
  formats:
    - csv
    - json
    - parquet
  compression:
    enabled: true
    level: 6
  batch_size: 10000
  include_acdoca: true
  partition_by_period: true
  partition_by_company: true

# Data quality - keep clean for ML training
data_quality:
  enabled: false
