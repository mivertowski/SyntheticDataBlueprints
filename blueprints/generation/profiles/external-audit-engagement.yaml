# External Audit Engagement Template
# Purpose: Generate synthetic data for a complete ISA-based external audit lifecycle
# Use case: Audit analytics training, audit workflow simulation, workpaper generation
#
# This is a generalized, non-proprietary configuration based entirely on
# International Standards on Auditing (ISA). It replaces firm-specific
# methodology definitions with public-standard equivalents.

global:
  industry: manufacturing
  start_date: "2024-01-01"
  period_months: 12
  seed: 90001
  group_currency: USD
  parallel: true
  worker_threads: 4
  memory_limit_mb: 4096

companies:
  - code: "1000"
    name: "Auditee Corp HQ"
    currency: USD
    country: US
    annual_transaction_volume: hundred_k
    volume_weight: 0.6
    fiscal_year_variant: K4
  - code: "2000"
    name: "Auditee Corp EU"
    currency: EUR
    country: DE
    annual_transaction_volume: fifty_k
    volume_weight: 0.4
    fiscal_year_variant: K4

chart_of_accounts:
  complexity: medium
  industry_specific: true
  min_hierarchy_depth: 3
  max_hierarchy_depth: 5

master_data:
  vendors:
    count_per_company: 200
    intercompany_rate: 0.15
  customers:
    count_per_company: 300
    intercompany_rate: 0.10
  materials:
    count_per_company: 500
    bom_enabled: true
  employees:
    count_per_company: 60
    manager_ratio: 0.12

document_flows:
  p2p:
    enabled: true
    chains_per_month: 500
    three_way_match_rate: 0.88
    partial_delivery_rate: 0.12
    gr_ir_clearing_enabled: true
  o2c:
    enabled: true
    chains_per_month: 800
    credit_check_failure_rate: 0.04
    partial_shipment_rate: 0.10
    return_rate: 0.02

# Fraud at realistic detection rates for audit context
fraud:
  enabled: true
  fraud_rate: 0.02
  fraud_type_distribution:
    fictitious_transaction: 0.20
    revenue_manipulation: 0.20
    expense_capitalization: 0.15
    duplicate_payment: 0.15
    timing_anomaly: 0.10
    suspense_account_abuse: 0.10
    split_transaction: 0.05
    unauthorized_access: 0.05
  clustering_enabled: true
  clustering_factor: 0.25
  approval_thresholds:
    - 1000.0
    - 5000.0
    - 25000.0
    - 100000.0

# Internal controls with realistic deficiency rates
internal_controls:
  enabled: true
  coso_enabled: true
  include_entity_level_controls: true
  target_maturity_level: managed
  exception_rate: 0.02
  sod_violation_rate: 0.01
  export_control_master_data: true
  sox_materiality_threshold: 10000.0

# Audit standards - ISA framework
audit_standards:
  enabled: true
  isa_compliance:
    enabled: true
    framework: isa
  generate_audit_trail: true
  sox:
    enabled: false   # ISA-only engagement (no PCAOB)

# FSM-driven audit lifecycle
audit_fsm:
  blueprint: builtin:fsa
  overlay: builtin:default
  depth: standard
  discriminators:
    tiers: [core]
  generate_events: true
  generate_workpapers: true

# Anomaly injection tuned for audit detection scenarios
anomaly_injection:
  enabled: true
  rates:
    total_rate: 0.02
    fraud_rate: 0.01
    error_rate: 0.005
    process_rate: 0.005
  near_miss:
    enabled: true
    proportion: 0.25
  difficulty_classification:
    enabled: true
  labeling:
    generate_difficulty_labels: true

# Balance and period close
balance:
  generate_opening_balances: true
  generate_trial_balances: true
  reconcile_subledgers: true

# Accounting standards for realistic financial statements
accounting_standards:
  enabled: true
  framework: ifrs
  revenue_recognition:
    enabled: true
  leases:
    enabled: true
  fair_value:
    enabled: true
  impairment:
    enabled: true

# Temporal patterns
temporal:
  enabled: true
  amount_mean_drift: 0.015
  amount_variance_drift: 0.005
  seasonal_drift: true
  drift_type: gradual

scenario:
  tags:
    - external_audit
    - isa
    - audit_engagement
    - workpaper_generation
    - audit_analytics
  profile: clean
  description: "Complete ISA-based external audit engagement with workpaper generation"
  ml_training: true
  target_anomaly_ratio: 0.02

output:
  output_directory: ./output/external_audit
  formats:
    - csv
    - json
    - parquet
  compression:
    enabled: true
    level: 6
  batch_size: 5000
  include_acdoca: true
  partition_by_period: true
  partition_by_company: true
