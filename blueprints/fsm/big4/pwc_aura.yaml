schema_version: '1.0'
depth: standard
methodology:
  name: PwC Aura ISA-Complete Financial Statement Audit
  version: '2025.1'
  framework: ISA
  description: ISA-complete financial statement audit methodology styled after PwC Aura workflow with Halo analytics suite,
    GL.ai anomaly detection, Cash.ai bank reconciliation, Evidence Match, ChatNational research, Extract data ingestion,
    Halo for Cryptocurrency assurance, and Advanced Walkthrough Assistant. Based on public ISA standards and publicly known
    tool names, not proprietary PwC content. 37 ISA procedures plus firm-specific FRISK assessment, Halo analytics,
    and multi-level quality review procedures.
discriminators:
  tiers:
  - core
actors:
- id: engagement_leader
  name: Engagement Leader
  responsibilities:
  - Overall engagement quality
  - Signing the audit report
  - Strategic direction
- id: engagement_manager
  name: Engagement Manager
  responsibilities:
  - Day-to-day engagement management
  - Reviewing workpapers
  - Team coordination
- id: senior_associate
  name: Senior Associate
  responsibilities:
  - Executing audit procedures
  - Preparing workpapers
  - Supervising staff
- id: associate
  name: Associate
  responsibilities:
  - Performing detailed testing
  - Documenting results
- id: data_analyst
  name: Halo Data Analyst
  responsibilities:
  - Data analytics procedures
  - Journal entry testing
  - Trend analysis
- id: qrp
  name: Quality Review Partner
  responsibilities:
  - Hot review of significant audit judgments
  - Pre-issuance quality review
  - Challenge of key audit conclusions
