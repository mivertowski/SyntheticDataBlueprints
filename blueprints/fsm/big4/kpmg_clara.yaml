      emits: Isa200Submitted
      guards:
      - all_steps_complete
    - from_state: under_review
      to_state: in_progress
      command: revise_isa_200
      emits: Isa200RevisionRequested
      guards: []
    - from_state: under_review
      to_state: completed
      command: approve_isa_200
      emits: Isa200Approved
      guards:
      - reviewer_approved
  steps:
  - id: step_isa_200_req_1
    order: 1
    action: establish
    actor: engagement_partner
    description: 'ISA 200 requirement paragraph 14: establish per Overall Objectives of the Independent Auditor and the Conduct
      of an Audit'
    binding: requirement
    command: establish_isa_200_requirement_14
    emits: Isa200Req14Completed
    judgment_level: human_required
    ai_capabilities:
    - Background research and benchmarking
    - Preliminary analysis and trend identification
    - Documentation drafting
    human_responsibilities:
    - Make all substantive professional judgments
    - Evaluate sufficiency and appropriateness of evidence
    - Document rationale for conclusions reached
