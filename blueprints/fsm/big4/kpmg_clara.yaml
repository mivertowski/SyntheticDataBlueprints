schema_version: '1.0'
depth: standard
methodology:
  name: KPMG Clara ISA-Complete Financial Statement Audit
  version: '2025.1'
  framework: ISA
  description: ISA-complete financial statement audit methodology styled after KPMG Clara workflow (KCw/KCa/KCc modules).
    Based on public ISA standards and publicly known tool names, not proprietary KPMG content. 37 ISA procedures plus firm-specific
    analytics and quality gate procedures.
discriminators:
  tiers:
  - core
actors:
- id: engagement_partner
  name: Engagement Partner
  responsibilities:
  - Overall engagement quality
  - Signing the audit report
  - Key audit matter determination
- id: engagement_manager
  name: Engagement Manager
  responsibilities:
  - Day-to-day engagement management
  - Reviewing workpapers
  - Team supervision
- id: senior_associate
  name: Senior Associate
  responsibilities:
  - Executing audit procedures
  - Preparing workpapers
  - Supervising staff
- id: associate
  name: Associate
  responsibilities:
  - Performing detailed testing
  - Documenting results
- id: eqr
  name: Engagement Quality Reviewer
  responsibilities:
  - Independent quality review
  - Concurring on significant judgments
- id: eqcr
  name: Engagement Quality Control Reviewer
  responsibilities:
  - Multi-point engagement quality control review
  - Pre-issuance sign-off on audit report
  - Review of significant judgments at planning, interim, and completion
