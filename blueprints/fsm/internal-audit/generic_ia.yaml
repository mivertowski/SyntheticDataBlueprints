forms_catalog: []
phases:
- id: ethics_and_professionalism
  name: Ethics & Professionalism
  order: -2
  description: Continuous domain ensuring all internal audit personnel maintain integrity, objectivity, competency, due professional
    care, and confidentiality in accordance with GIAS Domain II (Principles 1-5).
- id: governance_establishment
  name: Governance Establishment
  order: -1
  description: Establish and maintain the internal audit mandate, organizational independence, and board oversight mechanisms
    as required by GIAS Domain III (Principles 6-8). Reviewed annually.
  gate:
    all_of:
    - procedure: establish_ia_mandate
      state: completed
    - procedure: establish_organizational_independence
      state: completed
    - procedure: establish_board_oversight
      state: completed
- id: resource_management
  name: Resource Management
  order: 0
  description: Manage financial, human, and technological resources to ensure the internal audit function can deliver on its
    mandate. Covers GIAS Principle 10 and Principle 11 communication standards.
- id: strategic_planning
  name: Strategic Planning
  order: 1
  description: 'Maintain the audit universe, assess organizational risks, and develop the risk-based annual audit plan for
    board approval.

    '
  gate:
    all_of:
    - procedure: maintain_audit_universe
      state: completed
    - procedure: develop_annual_plan
      state: completed
- id: engagement_planning
  name: Engagement Planning
  order: 2
  description: 'Scope and plan individual audit engagements, assess engagement-level risks, allocate resources, and conduct
    the opening meeting with auditees.

    '
  gate:
    all_of:
    - procedure: scope_engagement
      state: completed
    - procedure: assess_engagement_risks
      state: completed
    - procedure: allocate_resources
      state: completed
    - procedure: conduct_opening_meeting
      state: completed
    - procedure: develop_work_program
      state: completed
- id: fieldwork
  name: Fieldwork
  order: 3
  description: 'Execute testing procedures, evaluate controls, develop findings using the C2CE framework, and discuss preliminary
    results with auditees.

    '
  gate:
    all_of:
    - procedure: execute_testing
      state: completed
    - procedure: evaluate_controls
      state: completed
    - procedure: develop_findings
      state: completed
    - procedure: discuss_findings
      state: completed
    - procedure: evaluate_findings
      state: completed
    - procedure: develop_recommendations
      state: completed
    - procedure: document_engagement_work
      state: completed
- id: reporting
  name: Reporting
  order: 4
  description: 'Draft the audit report, obtain management responses, and issue the final audit report for distribution to
    stakeholders.

    '
  gate:
    all_of:
    - procedure: prepare_draft_report
      state: completed
    - procedure: obtain_management_response
      state: completed
    - procedure: issue_final_report
      state: completed
- id: follow_up
  name: Follow-Up
  order: 5
  description: 'Monitor implementation of agreed management action plans, verify remediation effectiveness, and escalate overdue
    items.

    '
  gate:
    all_of:
    - procedure: monitor_action_plans
      state: completed
    - procedure: verify_remediation
      state: completed
- id: quality_assurance
  name: Quality Assurance
  order: 6
  description: Continuous quality assurance and improvement activities including internal QA assessments, performance measurement,
    and engagement quality oversight. Covers GIAS Principle 12.
procedures:
- id: maintain_audit_universe
  phase: strategic_planning
  title: Maintain Audit Universe
  base_hours: 8.0
  required_roles: [cae]
  discriminators:
    categories:
    - financial
    - operational
    - compliance
    - it
    - fraud
    - esg
  aggregate:
    initial_state: not_started
    states:
    - not_started
    - in_progress
    - under_review
    - completed
    transitions:
    - from_state: not_started
      to_state: in_progress
      command: start_universe_update
      emits: UniverseUpdateStarted
      guards: []
    - from_state: in_progress
      to_state: under_review
      command: submit_universe
      emits: UniverseSubmitted
      guards:
      - all_steps_complete
    - from_state: under_review
      to_state: completed
      command: approve_universe
      emits: UniverseApproved
      guards:
      - cae_approved
  steps:
  - id: universe_step_1
    order: 1
    action: identify
    actor: audit_director
    description: 'Identify all auditable entities, processes, and risk areas across the organization, updating the audit universe
      inventory.

      '
    binding: requirement
    command: identify_auditable_entities
    emits: AuditableEntitiesIdentified
    isa_mandate: ''
    guards: []
    evidence:
      inputs: []
      outputs:
      - ref: audit_universe
        type: assessment
    standards:
    - ref: GIAS-11.1
      paragraphs: []
      binding: requirement
      is_requirement: false
      text_hint: ''
    decisions: []
  - id: universe_step_2
    order: 2
    action: assess
    actor: audit_director
    description: 'Assess inherent and residual risk for each auditable entity using a consistent risk scoring methodology
      aligned with organizational risk appetite.

      '
    binding: requirement
    command: assess_universe_risks
    emits: UniverseRisksAssessed
    isa_mandate: ''
    guards: []
    standards:
    - ref: GIAS-11.2
      paragraphs: []
      binding: requirement
      is_requirement: false
      text_hint: ''
    decisions: []
  - id: universe_step_3
    order: 3
    action: prioritize
    actor: cae
    description: 'Prioritize auditable entities based on risk scores, strategic importance, time since last audit, and stakeholder
      requests.

      '
    binding: requirement
    command: prioritize_audit_entities
    emits: AuditEntitiesPrioritized
    isa_mandate: ''
    guards: []
    standards: []
    decisions: []
  preconditions: []
  knowledge_refs: []
- id: develop_annual_plan
  phase: strategic_planning
  title: Develop Annual Audit Plan
  base_hours: 8.0
  required_roles: [cae]
  discriminators:
    categories:
    - financial
    - operational
    - compliance
    - it
    - fraud
    - esg
  aggregate:
    initial_state: not_started
    states:
    - not_started
    - in_progress
    - under_review
    - board_approved
    - completed
    transitions:
    - from_state: not_started
      to_state: in_progress
      command: start_plan_development
      emits: PlanDevelopmentStarted
      guards: []
    - from_state: in_progress
      to_state: under_review
      command: submit_plan
      emits: PlanSubmitted
      guards:
      - all_steps_complete
    - from_state: under_review
      to_state: in_progress
      command: revise_plan
      emits: PlanRevisionRequested
      guards: []
    - from_state: under_review
      to_state: board_approved
      command: approve_plan
      emits: PlanBoardApproved
      guards:
      - board_approval_obtained
    - from_state: board_approved
      to_state: completed
      command: finalize_plan
      emits: PlanFinalized
      guards: []
  steps:
  - id: plan_step_1
    order: 1
    action: draft
    actor: cae
    description: 'Draft the risk-based annual internal audit plan, selecting engagements from the prioritized audit universe
      considering available resources and organizational objectives.

      '
    binding: requirement
    command: draft_annual_plan
    emits: AnnualPlanDrafted
    isa_mandate: ''
    guards: []
    evidence:
      inputs:
      - ref: audit_universe
        type: assessment
      outputs:
      - ref: annual_plan
        type: document
    standards:
    - ref: GIAS-11.2
      paragraphs: []
      binding: requirement
      is_requirement: false
      text_hint: ''
    decisions: []
  - id: plan_step_2
    order: 2
    action: present
    actor: cae
    description: 'Present the draft annual audit plan to the board audit committee for review, discussion, and approval.

      '
    binding: requirement
    command: present_plan_to_board
    emits: PlanPresentedToBoard
    isa_mandate: ''
    guards: []
    standards:
    - ref: GIAS-9.3
      paragraphs: []
      binding: requirement
      is_requirement: false
      text_hint: ''
    decisions: []
  - id: plan_step_3
    order: 3
    action: communicate
    actor: cae
    description: 'Communicate the approved annual audit plan to relevant stakeholders including senior management and engagement
      teams.

      '
    binding: requirement
    command: communicate_approved_plan
    emits: ApprovedPlanCommunicated
    isa_mandate: ''
    guards: []
    standards: []
    decisions: []
  preconditions:
  - maintain_audit_universe
  knowledge_refs: []
- id: scope_engagement
  phase: engagement_planning
  title: Scope Engagement
  base_hours: 6.0
  required_roles: [audit_manager]
  discriminators:
    engagement_types:
    - assurance
    - advisory
  aggregate:
    initial_state: not_started
    states:
    - not_started
    - in_progress
    - under_review
    - completed
    transitions:
    - from_state: not_started
      to_state: in_progress
      command: start_scoping
      emits: ScopingStarted
      guards: []
    - from_state: in_progress
      to_state: under_review
      command: submit_scope
      emits: ScopeSubmitted
      guards:
      - all_steps_complete
    - from_state: under_review
      to_state: completed
      command: approve_scope
      emits: ScopeApproved
      guards:
