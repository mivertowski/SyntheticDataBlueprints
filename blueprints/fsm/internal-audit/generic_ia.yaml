schema_version: '1.0'
depth: standard
methodology:
  name: Generic Internal Audit Methodology
  version: '2025.1'
  framework: IIA-GIAS
  description: 'A generic internal audit methodology based on the IIA Global Internal Audit Standards (GIAS) 2024. Covers
    the full internal audit lifecycle from strategic planning through follow-up, modeled as an event-sourced state machine.

    '
discriminators:
  categories:
  - financial
  - operational
  - compliance
  - it
  - fraud
  - esg
  risk_ratings:
  - high
  - medium
  - low
  engagement_types:
  - assurance
  - advisory
actors:
- id: cae
  name: Chief Audit Executive
  responsibilities:
  - Overall internal audit strategy and direction
  - Reporting to the board audit committee
  - Approving the annual audit plan
- id: audit_director
  name: Audit Director
  responsibilities:
  - Overseeing multiple audit engagements
  - Quality assurance review
  - Resource allocation decisions
- id: audit_manager
  name: Audit Manager
  responsibilities:
  - Day-to-day engagement management
  - Reviewing workpapers and findings
  - Ensuring engagement milestones are met
- id: senior_auditor
  name: Senior Auditor
  responsibilities:
  - Leading fieldwork execution
  - Drafting findings and recommendations
  - Supervising staff auditors
- id: staff_auditor
  name: Staff Auditor
  responsibilities:
  - Performing detailed testing procedures
  - Documenting test results
  - Gathering evidence
- id: sme
  name: Subject Matter Expert
  responsibilities:
  - Providing specialized domain knowledge
  - Reviewing technical findings
- id: auditee
  name: Auditee
  responsibilities:
  - Providing information and access
  - Responding to findings with action plans
- id: board_audit_committee
  name: Board Audit Committee
  responsibilities:
  - Approving the annual internal audit plan
  - Receiving and acting on audit reports
  - Overseeing CAE independence
